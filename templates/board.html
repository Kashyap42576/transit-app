<!DOCTYPE html>
<html>
<head>
    <title>Boarding Confirmation</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f9; text-align: center; padding: 20px; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 400px; margin: 40px auto; }
        h1 { color: #1a1a1a; margin-bottom: 5px; }
        .bus-id { font-size: 28px; color: #007bff; font-weight: bold; margin: 20px 0; background: #e9f2ff; padding: 15px; border-radius: 8px; border: 2px dashed #007bff;}
        .confirm-btn { background: #28a745; color: white; border: none; padding: 15px 30px; font-size: 20px; font-weight: bold; border-radius: 8px; cursor: pointer; width: 100%; box-shadow: 0 4px 6px rgba(40,167,69,0.3); }
        .confirm-btn:active { transform: scale(0.98); }
        
        #result-box { margin-top: 25px; padding: 15px; border-radius: 8px; font-weight: bold; font-size: 18px; display: none; }
        .success { background: #d4edda; color: #155724; border: 2px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 2px solid #f5c6cb; }
        
        /* Loading Spinner */
        .loader { border: 4px solid #f3f3f3; border-top: 4px solid #3498db; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 0 auto; display: none; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="card">
        <h1>🚌 Ready to Board?</h1>
        <p style="color: #666;">Passenger: <strong>{{ user_name }}</strong></p>
        
        <div class="bus-id">{{ bus_id }}</div>
        
        <div class="loader" id="spinner"></div>

        <button class="confirm-btn" id="boardBtn" onclick="processBoarding()">Tap to Confirm Ride</button>

        <div id="result-box"></div>
    </div>

    <script>
        // Use browser's built-in voice to speak text loudly
        function speak(text) {
            if ('speechSynthesis' in window) {
                let msg = new SpeechSynthesisUtterance(text);
                msg.rate = 1.0; 
                msg.pitch = 1.1; 
                window.speechSynthesis.speak(msg);
            }
        }

        function processBoarding() {
            document.getElementById('boardBtn').style.display = 'none';
            document.getElementById('spinner').style.display = 'block';
            document.getElementById('result-box').style.display = 'none';

            fetch('/api/confirm_boarding', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ bus_id: "{{ bus_id }}" })
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById('spinner').style.display = 'none';
                let resultBox = document.getElementById('result-box');
                resultBox.style.display = 'block';
                resultBox.innerText = data.message;
                
                // Speak the audio cue sent from the server
                speak(data.audio);

                if(data.status === 'success') {
                    resultBox.className = 'success';
                } else {
                    resultBox.className = 'error';
                    document.getElementById('boardBtn').style.display = 'block';
                    document.getElementById('boardBtn').innerText = "Try Again";
                }
            })
            .catch(error => {
                document.getElementById('spinner').style.display = 'none';
                speak("Network Error. Please try again.");
            });
        }
    </script>
</body>
</html>
